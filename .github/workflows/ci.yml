# CI for crateria/trance
# Requires: Actions allow GitHub-owned actions (checkout, cache).
# Required status checks on main: "Security advisories" and "Tests".
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_DENY_VERSION: "0.20.2"

jobs:
  advisories:
    name: Security advisories
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        run: |
          git init
          git remote add origin https://github.com/crateria/trance.git
          git fetch --depth=1 origin ${{ github.sha }}
          git reset --hard FETCH_HEAD

      - name: Install Rust (from rust-toolchain.toml)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup show
          rustc --version
          cargo --version

      - name: Install cargo-deny
        run: |
          mkdir -p ~/.cargo/bin
          curl -sSL https://github.com/EmbarkStudios/cargo-deny/releases/download/${{ env.CARGO_DENY_VERSION }}/cargo-deny-${{ env.CARGO_DENY_VERSION }}-x86_64-unknown-linux-musl.tar.gz | tar -xz --strip-components=1 -C ~/.cargo/bin
          chmod +x ~/.cargo/bin/cargo-deny
          cargo-deny --version

      - name: cargo deny check
        run: cargo-deny check

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        run: |
          git init
          git remote add origin https://github.com/crateria/trance.git
          git fetch --depth=1 origin ${{ github.sha }}
          git reset --hard FETCH_HEAD

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev pkg-config \
            libwayland-dev libxkbcommon-dev \
            libssl-dev

      - name: Install Rust (from rust-toolchain.toml)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup show
          rustc --version

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

      # Skip trance-applet: optional COSMIC UI, huge libcosmic/wgpu build.
      - name: cargo test (core + tui + cli)
        run: |
          cargo test \
            -p trance-api \
            -p trance-runner \
            -p trance-dbus \
            -p trance-upscaler \
            -p wayland-idle \
            -p wayland-present \
            -p trance-daemon \
            -p trance-cli \
            -p trance-tui \
            --all-features
